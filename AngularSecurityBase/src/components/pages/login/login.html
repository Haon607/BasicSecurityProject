<form #loginForm="ngForm" (ngSubmit)="login()" class="flex justify-center">
    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
        <legend class="fieldset-legend">{{ register ? 'Registrieren' : 'Login' }}</legend>

        <label class="input validator">
            <svg class="h-[1em] opacity-50" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </g>
            </svg>

            <input
                [(ngModel)]="user.username"
                maxlength="32"
                minlength="3"
                name="username"
                pattern="[A-Za-z][A-Za-z0-9\-]*"
                placeholder="Username"
                required
                type="text"
            />
        </label>
        <p class="validator-hint m-0">Must be 3 to 32 characters - containing only letters, numbers or dash</p>


        <label class="input validator">
            <svg class="h-[1em] opacity-50" fill="currentColor" viewBox="0 -960 960 960"
                 xmlns="http://www.w3.org/2000/svg">
                <path [attr.d]="Svg.password"/>
            </svg>

            <input
                [(ngModel)]="user.password"
                maxlength="256"
                minlength="8"
                name="password"
                placeholder="Password"
                required
                type="password"
            />
        </label>
        <p class="validator-hint m-0">Must be 8 to 256 characters</p>

        <label class="label">
            <input (click)="flipForm()" class="checkbox" type="checkbox"/>
            Registrieren
        </label>

        <button
            [disabled]="loginForm.invalid || inLogin()"
            class="btn btn-success mt-4">
            @if (inLogin()) {
                <span class="loading loading-spinner loading-md"></span>
            } @else {
                {{ register ? 'Registrieren' : 'Login' }}
            }
        </button>
    </fieldset>
</form>
