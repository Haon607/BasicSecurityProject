<h1 class="font-bold text-xl text-center">Nutzer</h1>

<div class="overflow-x-auto">
    @if (users()) {
        <table class="table table-zebra">
            <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th class="opacity-50 w-50">Aktionen</th>
            </tr>
            </thead>
            <tbody>
                @for (user of users(); track user.id) {
                    <tr>
                        <td>{{ user.username }}</td>
                        <td>{{ user.role }}</td>
                        <td>
                            <div class="w-50 flex justify-between">
                                <button [routerLink]="user.id"
                                        class="btn btn-soft">Details
                                </button>
                                <button [routerLink]="user.id + '/edit'"
                                        class="btn btn-soft btn-primary">Bearbeiten
                                </button>
                                <!--<button (click)="true" class="btn btn-soft btn-error">Löschen</button>-->
                            </div>
                        </td>
                    </tr>
                }
            </tbody>
        </table>
    } @else {
        <span class="loading loading-dots loading-md"></span>
    }
</div>
