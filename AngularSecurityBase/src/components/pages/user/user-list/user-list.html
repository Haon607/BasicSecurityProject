<h1 class="font-bold text-xl text-center">Nutzer</h1>

<div class="overflow-x-auto">
    <table class="table table-zebra">
        <thead>
        <tr>
            <th>Username</th>
            <th>Role</th>
            <th class="opacity-50">Aktionen</th>
        </tr>
        </thead>
        <tbody>
            @for (user of users(); track user.id) {
                <tr>
                    <td>{{ user.username }}</td>
                    <td>{{ user.role }}</td>
                    <td>
                    </td>
                </tr>
            } @empty {
                <span class="loading loading-dots loading-md"></span>
            }
        </tbody>
    </table>
</div>
